<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform Anotasi HAM — Validasi Putusan Pengadilan Indonesia</title>
  <meta name="description" content="Platform validasi ahli untuk kepatuhan HAM dalam putusan pengadilan Indonesia" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1612;
      --paper:  #f5f0e8;
      --cream:  #ede6d6;
      --gold:   #c8922a;
      --gold-l: #e8b84b;
      --red:    #8b2c2c;
      --green:  #2c5f3c;
      --blue:   #1e3a5f;
      --muted:  #7a6e5f;
      --border: #d4c9b0;
      --shadow: rgba(26,22,18,0.12);
      --serif: 'Source Serif 4', Georgia, serif;
      --display: 'Playfair Display', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Loading state */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    .loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-emblem {
      font-family: var(--display);
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }
    .loading-bar {
      width: 200px; height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar::after {
      content: '';
      display: block;
      height: 100%;
      background: var(--gold);
      animation: loading 1.4s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-emblem">⚖ HAM Anotasi</div>
    <div style="font-family:var(--serif);color:var(--muted);font-size:0.9rem">Memuat platform...</div>
    <div class="loading-bar"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/dist/main.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const l = document.getElementById('loading');
        if (l) { l.classList.add('fade-out'); setTimeout(() => l.remove(), 400); }
      }, 600);
    });
  </script>
</body>
</html>
